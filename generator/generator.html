<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-View App Generator</title>
<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
header{padding:12px;border-bottom:1px solid #333}
h1{margin:0;font-size:18px}
.container{padding:12px;display:grid;gap:12px}
textarea{width:100%;height:120px;background:#111;color:#fff;border:1px solid #333;padding:8px}
input,select{width:100%;padding:8px;background:#111;color:#fff;border:1px solid #333}
button{padding:10px;background:#222;color:#fff;border:none;cursor:pointer}
.view-card{border:1px solid #333;padding:10px;margin-top:10px}
.output{height:200px}
</style>
</head>
<body>
<header><h1>Multi-View Generator</h1></header>
<div class="container">

<input id="viewName" placeholder="View Name (e.g. songs)" />
<input id="jsonUrl" placeholder="JSON URL (GitHub raw)" />

<div id="fields"></div>

<button onclick="analyze()">Analyze JSON</button>
<button onclick="addView()">Add View</button>
<button onclick="generateApp()">Generate Multi-View App</button>

<textarea id="output" class="output"></textarea>

<div id="viewsPreview"></div>

</div>

<script>
let currentFields=[];
let views=[];

async function analyze(){
 const url=document.getElementById('jsonUrl').value;
 const res=await fetch(url);
 const json=await res.json();
 currentFields=Object.keys(json[0]||{});

 document.getElementById('fields').innerHTML=currentFields.map(f=>
  `<label>${f}: 
   <select data-field="${f}">
    <option value="">ignore</option>
    <option value="primary">Primary</option>
    <option value="secondary">Secondary</option>
    <option value="image">Image</option>
    <option value="summary">Summary</option>
    <option value="url">URL</option>
    <option value="sort">Sort</option>
    <option value="group">Group</option>
   </select>
  </label>`).join('<br>');
}

function addView(){
 const name=document.getElementById('viewName').value;
 const url=document.getElementById('jsonUrl').value;
 const selects=document.querySelectorAll('[data-field]');

 let cfg={name,url};

 selects.forEach(s=>{
  if(s.value) cfg[s.value]=s.getAttribute('data-field');
 });

 views.push(cfg);
 renderViews();
}

function renderViews(){
 document.getElementById('viewsPreview').innerHTML=views.map(v=>
  `<div class="view-card">${v.name} → ${v.url}</div>`).join('');
}

function generateApp(){
 const html=`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
nav{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333}
nav button{background:#111;color:#fff;border:none;padding:8px}
.card{border-bottom:1px solid #222;padding:10px}
img{width:100%;max-height:200px;object-fit:cover}
</style>
</head>
<body>
<nav>${views.map(v=>`<button onclick="loadView('${v.name}')">${v.name}</button>`).join('')}</nav>
<div id="app"></div>
<script>
const views=${JSON.stringify(views)};

function loadView(name){
 const v=views.find(x=>x.name===name);
 fetch(v.url).then(r=>r.json()).then(data=>render(data,v));
}

function fmt(v){return /^\\d+$/.test(v)?Number(v).toLocaleString():v}

function render(data,v){
 if(v.sort) data.sort((a,b)=>String(a[v.sort]).localeCompare(String(b[v.sort])));

 let html='';

 if(v.group){
  const g={};
  data.forEach(d=>{const k=d[v.group]||'Other';(g[k]=g[k]||[]).push(d)});
  Object.keys(g).forEach(k=>{
   html+=`<div style="background:#111;padding:6px">${k} (${g[k].length})</div>`;
   html+=g[k].slice(0,5).map(d=>card(d,v)).join('');
  });
 } else {
  html=data.slice(0,5).map(d=>card(d,v)).join('');
 }

 document.getElementById('app').innerHTML=html;
}

function card(d,v){
 return `<div class="card" onclick='detail(${JSON.stringify(d)})'>
  ${v.image?`<img src="${d[v.image]}">`:''}
  <div><b>${d[v.primary]||''}</b></div>
  <div>${d[v.secondary]||''}</div>
  <div>${v.summary?fmt(d[v.summary]):''}</div>
  <div>${v.url?`<span title="${d[v.url]}">🔗</span>`:''}</div>
 </div>`;
}

function detail(d){
 document.getElementById('app').innerHTML=`<button onclick="history.back()">Back</button>`+
 Object.entries(d).map(([k,v])=>{
  if(k.includes('image'))return `<img src="${v}">`;
  if(String(v).startsWith('http'))return `<div><b>${k}</b>: <a href="${v}" target="_blank">${v}</a></div>`;
  return `<div><b>${k}</b>: ${fmt(v)}</div>`;
 }).join('');
}

loadView(views[0].name);
</script>
</body>
</html>`;

 document.getElementById('output').value=html;
}
</script>
</body>
</html>
