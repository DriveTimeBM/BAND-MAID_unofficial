<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="logo.png">
<title>BAND-MAID Unofficial · Okyuji Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--border:#2a2a2a;
  --text:#f0f0f0;--text2:#999;--accent:#c8a96e;
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}

.app-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.app-logo{
  width:34px;height:34px;background:#111;border:1px solid var(--accent);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.app-logo img{width:22px;height:22px;object-fit:contain}
.app-nav-title{font-size:15px;font-weight:600;letter-spacing:0.04em}

.map-wrap{
  position:fixed;
  top:57px;left:0;right:0;bottom:0;
}
.map-wrap iframe{
  width:100%;height:100%;border:none;display:block;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo"><img src="logo.png" alt="" onerror="this.parentNode.textContent='🗺️'"></div>
  <div><div class="app-nav-title">BAND-MAID Unofficial · Okyuji Map</div></div>
</div>

<div class="map-wrap">
  <iframe
    src="https://www.google.com/maps/d/embed?mid=1-hUU-25MYERexy7XrFTF_vi1S9l550Q1&ehbc=2E312F"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

</body>
</html>
