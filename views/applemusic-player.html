<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND-MAID Apple Music Player</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #141414;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c8a96e;
    --accent-hover: #d9bc81;
    --pink: #f2a2c0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem;
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  h1 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
  }
  h1 .sub {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  select, input[type="text"], button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.7rem;
    font-size: 0.9rem;
    font-family: inherit;
  }
  input[type="text"] {
    min-width: 220px;
  }
  select:focus, input:focus, button:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover {
    background: var(--accent-hover);
    color: #0a0a0a;
  }
  button.active {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  label {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-right: 0.25rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 1rem;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }
  .player-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
  }
  .now-playing {
    margin-bottom: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .now-playing .label {
    color: var(--text-dim);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .now-playing .title {
    font-size: 1.1rem;
    margin-top: 0.25rem;
    color: var(--accent);
  }
  .now-playing .alt {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 0.15rem;
  }
  .embed-wrap {
    flex: 1;
    min-height: 175px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  .embed-wrap iframe {
    width: 100%;
    height: 175px;
    border: 0;
    display: block;
  }
  .player-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    flex-wrap: wrap;
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 2rem 1rem;
    font-style: italic;
  }
  .song-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 70vh;
  }
  .list-header {
    padding: 0.6rem 0.9rem;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .list-scroll {
    overflow-y: auto;
    flex: 1;
  }
  .song-item {
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    transition: background 0.1s;
  }
  .song-item:last-child { border-bottom: none; }
  .song-item:hover {
    background: var(--panel-2);
  }
  .song-item.active {
    background: rgba(200, 169, 110, 0.12);
    border-left: 3px solid var(--accent);
    padding-left: calc(0.9rem - 3px);
  }
  .song-name {
    color: var(--text);
    font-size: 0.92rem;
  }
  .song-item.active .song-name {
    color: var(--accent);
    font-weight: 500;
  }
  .song-alt {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 0.1rem;
  }
  .song-meta {
    color: var(--text-dim);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .footer {
    color: var(--text-dim);
    font-size: 0.75rem;
    text-align: center;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
  .badge {
    display: inline-block;
    font-size: 0.65rem;
    background: var(--accent);
    color: #0a0a0a;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-left: 0.4rem;
    font-weight: 600;
  }
  .scroll-hint {
    color: var(--text-dim);
    font-size: 0.7rem;
  }
  /* scrollbar */
  .list-scroll::-webkit-scrollbar { width: 8px; }
  .list-scroll::-webkit-scrollbar-track { background: var(--panel); }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .list-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>BAND-MAID Apple Music Player <span class="sub" id="trackCount"></span></h1>
    <div class="controls">
      <label for="countrySel">Country</label>
      <select id="countrySel" title="Apple Music storefront"></select>
      <input type="text" id="searchInput" placeholder="Search songs...">
      <button id="shuffleBtn" title="Shuffle play">🔀 Shuffle</button>
      <button id="modeBtn" title="Toggle auto-advance mode">↻ Sequential</button>
    </div>
  </header>

  <div class="layout">
    <div class="player-panel">
      <div class="now-playing">
        <div class="label">Now Playing</div>
        <div class="title" id="npTitle">— select a song —</div>
        <div class="alt" id="npAlt"></div>
      </div>
      <div class="embed-wrap" id="embedWrap">
        <div class="empty">Pick a song from the list to start playing.<br><br>Apple Music previews play ~90 seconds.<br>Sign in to the Apple Music embed to play full tracks.</div>
      </div>
      <div class="player-actions">
        <button id="prevBtn">⏮ Prev</button>
        <button id="nextBtn">Next ⏭</button>
        <button id="openBtn">↗ Open in Apple Music</button>
      </div>
    </div>

    <div class="song-list">
      <div class="list-header">
        <span id="listHeader">All songs</span>
        <span class="scroll-hint">Click to play</span>
      </div>
      <div class="list-scroll" id="songList"></div>
    </div>
  </div>

  <div class="footer">
    Source: <a href="https://drivetimebm.github.io/BAND-MAID_gpt/songs/applemusic.json" target="_blank" rel="noopener">applemusic.json</a>
    &nbsp;·&nbsp; Country preference saved locally.
  </div>
</div>

<script>
(() => {
  'use strict';

  const JSON_URL = 'https://drivetimebm.github.io/BAND-MAID_gpt/songs/applemusic.json';
  const LS_COUNTRY = 'bm_applemusic_country';
  const LS_MODE    = 'bm_applemusic_mode'; // 'sequential' | 'shuffle-auto' | 'none'

  // Apple Music storefronts (common set, can be expanded)
  const COUNTRIES = [
    ['us', 'United States'],
    ['ca', 'Canada'],
    ['jp', 'Japan'],
    ['gb', 'United Kingdom'],
    ['au', 'Australia'],
    ['de', 'Germany'],
    ['fr', 'France'],
    ['it', 'Italy'],
    ['es', 'Spain'],
    ['nl', 'Netherlands'],
    ['se', 'Sweden'],
    ['no', 'Norway'],
    ['dk', 'Denmark'],
    ['fi', 'Finland'],
    ['ie', 'Ireland'],
    ['nz', 'New Zealand'],
    ['mx', 'Mexico'],
    ['br', 'Brazil'],
    ['ar', 'Argentina'],
    ['cl', 'Chile'],
    ['pl', 'Poland'],
    ['cz', 'Czech Republic'],
    ['at', 'Austria'],
    ['be', 'Belgium'],
    ['ch', 'Switzerland'],
    ['pt', 'Portugal'],
    ['gr', 'Greece'],
    ['tr', 'Turkey'],
    ['ru', 'Russia'],
    ['ua', 'Ukraine'],
    ['kr', 'South Korea'],
    ['tw', 'Taiwan'],
    ['hk', 'Hong Kong'],
    ['sg', 'Singapore'],
    ['my', 'Malaysia'],
    ['th', 'Thailand'],
    ['ph', 'Philippines'],
    ['id', 'Indonesia'],
    ['vn', 'Vietnam'],
    ['in', 'India'],
    ['za', 'South Africa'],
    ['ae', 'United Arab Emirates'],
    ['sa', 'Saudi Arabia'],
    ['il', 'Israel'],
  ];

  // Map of common navigator.language codes to Apple storefronts
  function detectCountry() {
    const saved = localStorage.getItem(LS_COUNTRY);
    if (saved && COUNTRIES.some(c => c[0] === saved)) return saved;

    const lang = (navigator.language || 'en-US').toLowerCase();
    const region = lang.split('-')[1];
    if (region) {
      const code = region.toLowerCase();
      if (COUNTRIES.some(c => c[0] === code)) return code;
    }
    // Fallback to language-only common mappings
    const langOnly = lang.split('-')[0];
    const langMap = { ja: 'jp', ko: 'kr', de: 'de', fr: 'fr', es: 'es', it: 'it', pt: 'br', nl: 'nl', sv: 'se', no: 'no', da: 'dk', fi: 'fi', pl: 'pl', cs: 'cz', ru: 'ru', uk: 'ua', tr: 'tr', el: 'gr', he: 'il', ar: 'ae', zh: 'tw', th: 'th', vi: 'vn', id: 'id', ms: 'my' };
    if (langMap[langOnly]) return langMap[langOnly];
    return 'us';
  }

  // Parse a music.apple.com URL into { albumId, songId, urlKind }
  // Handles:
  //   /<cc>/album/<slug>/<albumId>?i=<songId>      -> track within album
  //   /<cc>/album/<slug>/<albumId>                 -> album (or first track)
  //   /<cc>/song/<slug>/<songId>                   -> standalone song
  function parseAppleUrl(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean); // [cc, kind, slug, id]
      const kind = parts[1];
      const lastId = parts[parts.length - 1];
      const songIdFromQuery = u.searchParams.get('i');

      if (kind === 'song') {
        return { kind: 'song', songId: lastId, albumId: null };
      }
      if (kind === 'album') {
        return { kind: 'album', albumId: lastId, songId: songIdFromQuery || null };
      }
      return null;
    } catch { return null; }
  }

  // Build embed.music.apple.com URL for current country
  function buildEmbedUrl(parsed, country) {
    if (!parsed) return null;
    if (parsed.kind === 'song') {
      return `https://embed.music.apple.com/${country}/song/${parsed.songId}`;
    }
    // album kind
    let url = `https://embed.music.apple.com/${country}/album/${parsed.albumId}`;
    if (parsed.songId) url += `?i=${parsed.songId}`;
    return url;
  }

  // Build a normal music.apple.com URL for "Open in Apple Music"
  function buildOpenUrl(parsed, country) {
    if (!parsed) return null;
    if (parsed.kind === 'song') {
      return `https://music.apple.com/${country}/song/${parsed.songId}`;
    }
    let url = `https://music.apple.com/${country}/album/${parsed.albumId}`;
    if (parsed.songId) url += `?i=${parsed.songId}`;
    return url;
  }

  // --- State ---
  const state = {
    songs: [],          // raw from JSON, each augmented with parsed
    filtered: [],       // after search
    country: detectCountry(),
    currentIdx: -1,     // index into state.filtered
    mode: localStorage.getItem(LS_MODE) || 'sequential', // 'sequential' | 'shuffle-auto' | 'none'
  };

  // --- DOM refs ---
  const $ = id => document.getElementById(id);
  const countrySel = $('countrySel');
  const searchInput = $('searchInput');
  const songList = $('songList');
  const embedWrap = $('embedWrap');
  const npTitle = $('npTitle');
  const npAlt = $('npAlt');
  const trackCount = $('trackCount');
  const listHeader = $('listHeader');
  const shuffleBtn = $('shuffleBtn');
  const modeBtn = $('modeBtn');
  const prevBtn = $('prevBtn');
  const nextBtn = $('nextBtn');
  const openBtn = $('openBtn');

  // --- Populate country dropdown ---
  COUNTRIES.forEach(([code, name]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${name} (${code.toUpperCase()})`;
    countrySel.appendChild(opt);
  });
  countrySel.value = state.country;

  countrySel.addEventListener('change', () => {
    state.country = countrySel.value;
    localStorage.setItem(LS_COUNTRY, state.country);
    // Re-render current player with new storefront
    if (state.currentIdx >= 0) playIndex(state.currentIdx);
  });

  // --- Render song list ---
  function renderList() {
    songList.innerHTML = '';
    if (state.filtered.length === 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = 'No matches.';
      songList.appendChild(div);
      return;
    }
    const frag = document.createDocumentFragment();
    state.filtered.forEach((song, i) => {
      const item = document.createElement('div');
      item.className = 'song-item' + (i === state.currentIdx ? ' active' : '');
      item.dataset.idx = i;
      const left = document.createElement('div');
      const nameEl = document.createElement('div');
      nameEl.className = 'song-name';
      nameEl.textContent = song.SongName;
      left.appendChild(nameEl);
      if (song.AltName) {
        const altEl = document.createElement('div');
        altEl.className = 'song-alt';
        altEl.textContent = song.AltName;
        left.appendChild(altEl);
      }
      const meta = document.createElement('div');
      meta.className = 'song-meta';
      meta.textContent = song.parsed ? (song.parsed.kind === 'song' ? 'song' : (song.parsed.songId ? 'track' : 'album')) : '';
      item.appendChild(left);
      item.appendChild(meta);
      frag.appendChild(item);
    });
    songList.appendChild(frag);
    listHeader.textContent = state.filtered.length === state.songs.length
      ? `All songs (${state.songs.length})`
      : `${state.filtered.length} of ${state.songs.length}`;
  }

  // Event delegation for list clicks
  songList.addEventListener('click', e => {
    const item = e.target.closest('.song-item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx, 10);
    if (!isNaN(idx)) playIndex(idx);
  });

  // --- Search ---
  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applySearch, 120);
  });

  function applySearch() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      state.filtered = state.songs.slice();
    } else {
      state.filtered = state.songs.filter(s =>
        s.SongName.toLowerCase().includes(q) ||
        (s.AltName && s.AltName.toLowerCase().includes(q))
      );
    }
    // Reset selection if current song is filtered out
    if (state.currentIdx >= 0) {
      const currentSong = state._currentSong;
      const newIdx = state.filtered.indexOf(currentSong);
      state.currentIdx = newIdx; // may be -1
    }
    renderList();
  }

  // --- Play a specific index ---
  function playIndex(idx) {
    if (idx < 0 || idx >= state.filtered.length) return;
    const song = state.filtered[idx];
    state.currentIdx = idx;
    state._currentSong = song;

    const embedUrl = buildEmbedUrl(song.parsed, state.country);
    if (!embedUrl) {
      embedWrap.innerHTML = '<div class="empty">Can\'t parse this URL.</div>';
      return;
    }

    // Replace iframe
    embedWrap.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.allow = 'autoplay *; encrypted-media *; clipboard-write';
    iframe.sandbox = 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation';
    iframe.src = embedUrl;
    iframe.loading = 'eager';
    embedWrap.appendChild(iframe);

    npTitle.textContent = song.SongName;
    npAlt.textContent = song.AltName || '';
    openBtn.dataset.url = buildOpenUrl(song.parsed, state.country) || '';
    renderList();

    // Scroll active item into view
    const active = songList.querySelector('.song-item.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // --- Prev / Next / Shuffle ---
  function playNext() {
    if (state.filtered.length === 0) return;
    if (state.mode === 'shuffle-auto') {
      let next;
      if (state.filtered.length === 1) { next = 0; }
      else {
        do { next = Math.floor(Math.random() * state.filtered.length); }
        while (next === state.currentIdx);
      }
      playIndex(next);
    } else {
      const next = (state.currentIdx + 1) % state.filtered.length;
      playIndex(next);
    }
  }
  function playPrev() {
    if (state.filtered.length === 0) return;
    const prev = (state.currentIdx - 1 + state.filtered.length) % state.filtered.length;
    playIndex(prev);
  }
  nextBtn.addEventListener('click', playNext);
  prevBtn.addEventListener('click', playPrev);

  shuffleBtn.addEventListener('click', () => {
    if (state.filtered.length === 0) return;
    const idx = Math.floor(Math.random() * state.filtered.length);
    playIndex(idx);
  });

  // Toggle auto-advance mode (visual only, since Apple's embed doesn't expose 'ended')
  function applyModeUi() {
    if (state.mode === 'shuffle-auto') {
      modeBtn.textContent = '🔀 Shuffle (next)';
      modeBtn.classList.add('active');
    } else {
      modeBtn.textContent = '↻ Sequential';
      modeBtn.classList.remove('active');
    }
  }
  modeBtn.addEventListener('click', () => {
    state.mode = state.mode === 'sequential' ? 'shuffle-auto' : 'sequential';
    localStorage.setItem(LS_MODE, state.mode);
    applyModeUi();
  });
  applyModeUi();

  openBtn.addEventListener('click', () => {
    const url = openBtn.dataset.url;
    if (url) window.open(url, '_blank', 'noopener');
  });

  // --- Load JSON ---
  async function load() {
    try {
      const res = await fetch(JSON_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state.songs = data.map(s => ({ ...s, parsed: parseAppleUrl(s.Url) }))
                        .filter(s => s.parsed); // drop unparseable
      state.filtered = state.songs.slice();
      trackCount.textContent = `(${state.songs.length} tracks)`;
      renderList();
    } catch (err) {
      songList.innerHTML = `<div class="empty">Failed to load song list:<br>${err.message}</div>`;
      console.error(err);
    }
  }
  load();
})();
</script>
</body>
</html>
