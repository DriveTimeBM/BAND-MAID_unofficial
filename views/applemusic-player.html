<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND-MAID Apple Music Player</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #141414;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c8a96e;
    --accent-hover: #d9bc81;
    --pink: #f2a2c0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem;
  }
  header.topbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  h1 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
  }
  h1 .sub {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  select, input[type="text"], button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.7rem;
    font-size: 0.9rem;
    font-family: inherit;
  }
  input[type="text"] { min-width: 220px; }
  select:focus, input:focus, button:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.active {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  label {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-right: 0.25rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 1rem;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* Player panel */
  .player-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
  }
  .now-playing {
    display: flex;
    gap: 0.9rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .np-cover {
    width: 96px;
    height: 96px;
    border-radius: 8px;
    background: var(--panel-2);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }
  .np-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .np-cover .placeholder {
    color: var(--text-dim);
    font-size: 1.6rem;
  }
  .np-text { flex: 1; min-width: 0; }
  .now-playing .label {
    color: var(--text-dim);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .now-playing .title {
    font-size: 1.15rem;
    margin-top: 0.2rem;
    color: var(--accent);
    overflow-wrap: anywhere;
  }
  .now-playing .album-line {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }
  .now-playing .alt {
    color: var(--text-dim);
    font-size: 0.88rem;
    margin-top: 0.15rem;
    font-style: italic;
  }
  .embed-wrap {
    flex: 1;
    min-height: 175px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  .embed-wrap iframe {
    width: 100%;
    height: 175px;
    border: 0;
    display: block;
  }
  .player-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    flex-wrap: wrap;
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 2rem 1rem;
    font-style: italic;
  }

  /* Song list */
  .song-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 78vh;
  }
  .list-header {
    padding: 0.6rem 0.9rem;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .list-header .toggles { display: flex; gap: 0.3rem; }
  .list-header button {
    padding: 0.2rem 0.5rem;
    font-size: 0.72rem;
  }
  .list-scroll { overflow-y: auto; flex: 1; }
  .album-group { border-bottom: 1px solid var(--border); }
  .album-group:last-child { border-bottom: none; }
  .album-header {
    padding: 0.55rem 0.75rem;
    background: var(--panel-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    user-select: none;
    transition: background 0.1s;
  }
  .album-header:hover { background: #232323; }
  .cover {
    border-radius: 4px;
    background: var(--panel);
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover.album-size { width: 44px; height: 44px; }
  .cover.song-size  { width: 32px; height: 32px; }
  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cover .placeholder {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .album-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .album-name {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.92rem;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    overflow-wrap: anywhere;
  }
  .chev {
    color: var(--text-dim);
    font-size: 0.75rem;
    transition: transform 0.15s;
    display: inline-block;
    width: 1em;
    flex-shrink: 0;
  }
  .album-group.collapsed .chev { transform: rotate(-90deg); }
  .album-count {
    color: var(--text-dim);
    font-size: 0.7rem;
  }
  .album-group.collapsed .album-tracks { display: none; }
  .song-item {
    padding: 0.4rem 0.9rem 0.4rem 1.4rem;
    border-top: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    transition: background 0.1s;
  }
  .song-item:hover { background: var(--panel-2); }
  .song-item.active {
    background: rgba(200, 169, 110, 0.12);
    border-left: 3px solid var(--accent);
    padding-left: calc(1.4rem - 3px);
  }
  .song-text {
    flex: 1;
    min-width: 0;
  }
  .song-name {
    color: var(--text);
    font-size: 0.9rem;
  }
  .song-item.active .song-name {
    color: var(--accent);
    font-weight: 500;
  }
  .song-alt {
    color: var(--text-dim);
    font-size: 0.76rem;
    margin-top: 0.1rem;
    font-style: italic;
  }
  .song-meta {
    color: var(--text-dim);
    font-size: 0.68rem;
    flex-shrink: 0;
  }
  .footer {
    color: var(--text-dim);
    font-size: 0.75rem;
    text-align: center;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
  .list-scroll::-webkit-scrollbar { width: 8px; }
  .list-scroll::-webkit-scrollbar-track { background: var(--panel); }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .list-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>BAND-MAID Apple Music Player <span class="sub" id="trackCount"></span></h1>
    <div class="controls">
      <label for="countrySel">Country</label>
      <select id="countrySel" title="Apple Music storefront"></select>
      <input type="text" id="searchInput" placeholder="Search songs / albums...">
      <button id="shuffleBtn" title="Play a random song">🔀 Shuffle</button>
      <button id="modeBtn" title="Toggle next-track mode">↻ Sequential</button>
    </div>
  </header>

  <div class="layout">
    <div class="player-panel">
      <div class="now-playing">
        <div class="np-cover" id="npCover"><span class="placeholder">♪</span></div>
        <div class="np-text">
          <div class="label">Now Playing</div>
          <div class="title" id="npTitle">— select a song —</div>
          <div class="album-line" id="npAlbum"></div>
          <div class="alt" id="npAlt"></div>
        </div>
      </div>
      <div class="embed-wrap" id="embedWrap">
        <div class="empty">Pick a song from the list to start playing.<br><br>Apple Music previews play ~90 seconds.<br>Sign in to the Apple Music embed to play full tracks.</div>
      </div>
      <div class="player-actions">
        <button id="prevBtn">⏮ Prev</button>
        <button id="nextBtn">Next ⏭</button>
        <button id="openBtn">↗ Open in Apple Music</button>
      </div>
    </div>

    <div class="song-list">
      <div class="list-header">
        <span id="listHeader">All songs</span>
        <span class="toggles">
          <button id="expandAllBtn" title="Expand all albums">Expand all</button>
          <button id="collapseAllBtn" title="Collapse all albums">Collapse all</button>
        </span>
      </div>
      <div class="list-scroll" id="songList"></div>
    </div>
  </div>

  <div class="footer">
    Source: <a href="https://drivetimebm.github.io/BAND-MAID_gpt/songs/applemusic.json" target="_blank" rel="noopener">applemusic.json</a>
    &nbsp;·&nbsp; Country &amp; collapsed albums saved locally.
  </div>
</div>

<script>
(() => {
  'use strict';

  const JSON_URL = 'https://drivetimebm.github.io/BAND-MAID_gpt/songs/applemusic.json';
  const LS_COUNTRY   = 'bm_applemusic_country';
  const LS_MODE      = 'bm_applemusic_mode';
  const LS_COLLAPSED = 'bm_applemusic_collapsed_albums';

  const COUNTRIES = [
    ['us','United States'],['ca','Canada'],['jp','Japan'],['gb','United Kingdom'],
    ['au','Australia'],['de','Germany'],['fr','France'],['it','Italy'],['es','Spain'],
    ['nl','Netherlands'],['se','Sweden'],['no','Norway'],['dk','Denmark'],['fi','Finland'],
    ['ie','Ireland'],['nz','New Zealand'],['mx','Mexico'],['br','Brazil'],['ar','Argentina'],
    ['cl','Chile'],['pl','Poland'],['cz','Czech Republic'],['at','Austria'],['be','Belgium'],
    ['ch','Switzerland'],['pt','Portugal'],['gr','Greece'],['tr','Turkey'],['ru','Russia'],
    ['ua','Ukraine'],['kr','South Korea'],['tw','Taiwan'],['hk','Hong Kong'],['sg','Singapore'],
    ['my','Malaysia'],['th','Thailand'],['ph','Philippines'],['id','Indonesia'],['vn','Vietnam'],
    ['in','India'],['za','South Africa'],['ae','United Arab Emirates'],['sa','Saudi Arabia'],
    ['il','Israel'],
  ];

  function detectCountry() {
    const saved = localStorage.getItem(LS_COUNTRY);
    if (saved && COUNTRIES.some(c => c[0] === saved)) return saved;
    const lang = (navigator.language || 'en-US').toLowerCase();
    const region = lang.split('-')[1];
    if (region && COUNTRIES.some(c => c[0] === region.toLowerCase())) return region.toLowerCase();
    const langOnly = lang.split('-')[0];
    const langMap = { ja:'jp', ko:'kr', de:'de', fr:'fr', es:'es', it:'it', pt:'br', nl:'nl', sv:'se', no:'no', da:'dk', fi:'fi', pl:'pl', cs:'cz', ru:'ru', uk:'ua', tr:'tr', el:'gr', he:'il', ar:'ae', zh:'tw', th:'th', vi:'vn', id:'id', ms:'my' };
    if (langMap[langOnly]) return langMap[langOnly];
    return 'us';
  }

  function parseAppleUrl(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      const kind = parts[1];
      const lastId = parts[parts.length - 1];
      const songIdFromQuery = u.searchParams.get('i');
      if (kind === 'song') return { kind:'song', songId:lastId, albumId:null };
      if (kind === 'album') return { kind:'album', albumId:lastId, songId:songIdFromQuery || null };
      return null;
    } catch { return null; }
  }

  function buildEmbedUrl(parsed, country) {
    if (!parsed) return null;
    if (parsed.kind === 'song') return `https://embed.music.apple.com/${country}/song/${parsed.songId}`;
    let url = `https://embed.music.apple.com/${country}/album/${parsed.albumId}`;
    if (parsed.songId) url += `?i=${parsed.songId}`;
    return url;
  }
  function buildOpenUrl(parsed, country) {
    if (!parsed) return null;
    if (parsed.kind === 'song') return `https://music.apple.com/${country}/song/${parsed.songId}`;
    let url = `https://music.apple.com/${country}/album/${parsed.albumId}`;
    if (parsed.songId) url += `?i=${parsed.songId}`;
    return url;
  }

  const SINGLES_KEY = '__SINGLES__';

  const state = {
    rawSongs: [],
    groups: [],
    flatFiltered: [],
    country: detectCountry(),
    currentSong: null,
    mode: localStorage.getItem(LS_MODE) || 'sequential',
    collapsed: loadCollapsed(),
  };

  function loadCollapsed() {
    try {
      const raw = localStorage.getItem(LS_COLLAPSED);
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  }
  function saveCollapsed() {
    localStorage.setItem(LS_COLLAPSED, JSON.stringify([...state.collapsed]));
  }

  const $ = id => document.getElementById(id);
  const countrySel = $('countrySel');
  const searchInput = $('searchInput');
  const songList = $('songList');
  const embedWrap = $('embedWrap');
  const npCover = $('npCover');
  const npTitle = $('npTitle');
  const npAlbum = $('npAlbum');
  const npAlt = $('npAlt');
  const trackCount = $('trackCount');
  const listHeader = $('listHeader');
  const shuffleBtn = $('shuffleBtn');
  const modeBtn = $('modeBtn');
  const prevBtn = $('prevBtn');
  const nextBtn = $('nextBtn');
  const openBtn = $('openBtn');
  const expandAllBtn = $('expandAllBtn');
  const collapseAllBtn = $('collapseAllBtn');

  COUNTRIES.forEach(([code, name]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${name} (${code.toUpperCase()})`;
    countrySel.appendChild(opt);
  });
  countrySel.value = state.country;
  countrySel.addEventListener('change', () => {
    state.country = countrySel.value;
    localStorage.setItem(LS_COUNTRY, state.country);
    if (state.currentSong) playSong(state.currentSong);
  });

  // Tally images per album to pick the most common one for the album header.
  // This handles cases where some tracks have their own single covers — the
  // album header still shows the canonical album art (i.e. the cover used by
  // the most tracks on that album).
  function buildGroups() {
    const map = new Map();
    state.rawSongs.forEach(song => {
      const hasAlbum = song.Album && song.Album.trim() !== '';
      const key = hasAlbum ? song.Album : SINGLES_KEY;
      if (!map.has(key)) {
        map.set(key, {
          key,
          name: hasAlbum ? song.Album : 'Singles',
          songs: [],
          sortId: hasAlbum ? null : Number.MAX_SAFE_INTEGER,
          image: null,
          _imageCounts: new Map(),
        });
      }
      const grp = map.get(key);
      grp.songs.push(song);
      if (grp.sortId === null && song.parsed && song.parsed.albumId) {
        grp.sortId = parseInt(song.parsed.albumId, 10);
      }
      if (song.Image && song.Image.trim() !== '') {
        const url = song.Image;
        grp._imageCounts.set(url, (grp._imageCounts.get(url) || 0) + 1);
      }
    });

    // Pick the most-common image for each group as the album cover
    map.forEach(grp => {
      if (grp._imageCounts.size > 0) {
        let bestUrl = null, bestCount = -1;
        grp._imageCounts.forEach((count, url) => {
          if (count > bestCount) { bestCount = count; bestUrl = url; }
        });
        grp.image = bestUrl;
      }
      delete grp._imageCounts;
    });

    const groups = [...map.values()].sort((a, b) => {
      const aId = a.sortId ?? Number.MAX_SAFE_INTEGER - 1;
      const bId = b.sortId ?? Number.MAX_SAFE_INTEGER - 1;
      if (aId !== bId) return aId - bId;
      return a.name.localeCompare(b.name);
    });

    const collator = new Intl.Collator(undefined, { sensitivity: 'base', numeric: true });
    groups.forEach(g => g.songs.sort((a, b) => collator.compare(a.SongName, b.SongName)));

    state.groups = groups;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  // Build a cover element. sizeClass is 'album-size' or 'song-size'.
  // Returns an HTML string. Uses onerror to swap to placeholder on load failure.
  function coverHtml(imgUrl, sizeClass) {
    if (imgUrl) {
      return `<div class="cover ${sizeClass}"><img src="${escapeHtml(imgUrl)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<span class=&quot;placeholder&quot;>♪</span>'"></div>`;
    }
    return `<div class="cover ${sizeClass}"><span class="placeholder">♪</span></div>`;
  }

  function renderList() {
    const q = searchInput.value.trim().toLowerCase();
    const songMatches = s => {
      if (!q) return true;
      return s.SongName.toLowerCase().includes(q)
          || (s.AltName && s.AltName.toLowerCase().includes(q))
          || (s.Album && s.Album.toLowerCase().includes(q));
    };

    songList.innerHTML = '';
    const frag = document.createDocumentFragment();
    let visibleCount = 0;
    let visibleAlbums = 0;
    const flatFiltered = [];

    state.groups.forEach(group => {
      const albumNameMatches = q && group.name.toLowerCase().includes(q);
      const matching = albumNameMatches ? group.songs : group.songs.filter(songMatches);
      if (matching.length === 0) return;

      visibleAlbums++;
      visibleCount += matching.length;
      flatFiltered.push(...matching);

      const groupEl = document.createElement('div');
      groupEl.className = 'album-group' + (state.collapsed.has(group.key) ? ' collapsed' : '');
      groupEl.dataset.key = group.key;

      const headerEl = document.createElement('div');
      headerEl.className = 'album-header';
      headerEl.innerHTML = `
        ${coverHtml(group.image, 'album-size')}
        <div class="album-info">
          <div class="album-name"><span class="chev">▾</span>${escapeHtml(group.name)}</div>
          <div class="album-count">${matching.length} ${matching.length === 1 ? 'track' : 'tracks'}</div>
        </div>
      `;
      headerEl.addEventListener('click', () => {
        if (state.collapsed.has(group.key)) state.collapsed.delete(group.key);
        else state.collapsed.add(group.key);
        groupEl.classList.toggle('collapsed');
        saveCollapsed();
      });
      groupEl.appendChild(headerEl);

      const tracksEl = document.createElement('div');
      tracksEl.className = 'album-tracks';
      matching.forEach(song => {
        const item = document.createElement('div');
        const isActive = state.currentSong === song;
        item.className = 'song-item' + (isActive ? ' active' : '');
        item.dataset.songId = song._id;

        // Per-song cover: falls back to the album's cover if the song has no
        // image of its own, then to placeholder.
        const songImg = (song.Image && song.Image.trim() !== '') ? song.Image : group.image;
        const metaText = song.parsed
          ? (song.parsed.kind === 'song' ? 'song' : (song.parsed.songId ? 'track' : 'album'))
          : '';

        item.innerHTML = `
          ${coverHtml(songImg, 'song-size')}
          <div class="song-text">
            <div class="song-name">${escapeHtml(song.SongName)}</div>
            ${song.AltName ? `<div class="song-alt">${escapeHtml(song.AltName)}</div>` : ''}
          </div>
          <div class="song-meta">${escapeHtml(metaText)}</div>
        `;
        tracksEl.appendChild(item);
      });
      groupEl.appendChild(tracksEl);
      frag.appendChild(groupEl);
    });

    if (visibleCount === 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = 'No matches.';
      songList.appendChild(div);
    } else {
      songList.appendChild(frag);
    }

    state.flatFiltered = flatFiltered;
    listHeader.textContent = q
      ? `${visibleCount} of ${state.rawSongs.length} tracks · ${visibleAlbums} albums`
      : `${state.rawSongs.length} tracks · ${state.groups.length} albums`;
  }

  songList.addEventListener('click', e => {
    const item = e.target.closest('.song-item');
    if (!item) return;
    const id = item.dataset.songId;
    const song = state.rawSongs.find(s => s._id === id);
    if (song) playSong(song);
  });

  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderList, 120);
  });

  function setNowPlayingCover(imgUrl) {
    npCover.innerHTML = '';
    if (imgUrl) {
      const img = document.createElement('img');
      img.alt = '';
      img.loading = 'eager';
      img.src = imgUrl;
      img.onerror = () => {
        npCover.innerHTML = '<span class="placeholder">♪</span>';
      };
      npCover.appendChild(img);
    } else {
      npCover.innerHTML = '<span class="placeholder">♪</span>';
    }
  }

  function playSong(song) {
    state.currentSong = song;
    const embedUrl = buildEmbedUrl(song.parsed, state.country);
    if (!embedUrl) {
      embedWrap.innerHTML = '<div class="empty">Can\'t parse this URL.</div>';
      return;
    }
    embedWrap.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.allow = 'autoplay *; encrypted-media *; clipboard-write';
    iframe.sandbox = 'allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation';
    iframe.src = embedUrl;
    iframe.loading = 'eager';
    embedWrap.appendChild(iframe);

    npTitle.textContent = song.SongName;
    npAlbum.textContent = song.Album ? `from ${song.Album}` : '(single)';
    npAlt.textContent = song.AltName || '';

    // Now Playing cover: song's own Image, falling back to its album's image
    let coverUrl = (song.Image && song.Image.trim() !== '') ? song.Image : null;
    if (!coverUrl) {
      const groupKey = song.Album && song.Album.trim() !== '' ? song.Album : SINGLES_KEY;
      const grp = state.groups.find(g => g.key === groupKey);
      coverUrl = grp ? grp.image : null;
    }
    setNowPlayingCover(coverUrl);

    openBtn.dataset.url = buildOpenUrl(song.parsed, state.country) || '';

    const groupKey = song.Album && song.Album.trim() !== '' ? song.Album : SINGLES_KEY;
    if (state.collapsed.has(groupKey)) {
      state.collapsed.delete(groupKey);
      saveCollapsed();
    }

    renderList();
    const active = songList.querySelector('.song-item.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function playNext() {
    const list = state.flatFiltered;
    if (list.length === 0) return;
    if (state.mode === 'shuffle-auto') {
      let next;
      if (list.length === 1) next = 0;
      else {
        do { next = Math.floor(Math.random() * list.length); }
        while (list[next] === state.currentSong);
      }
      playSong(list[next]);
    } else {
      const idx = list.indexOf(state.currentSong);
      const nextIdx = idx < 0 ? 0 : (idx + 1) % list.length;
      playSong(list[nextIdx]);
    }
  }
  function playPrev() {
    const list = state.flatFiltered;
    if (list.length === 0) return;
    const idx = list.indexOf(state.currentSong);
    const prevIdx = idx < 0 ? 0 : (idx - 1 + list.length) % list.length;
    playSong(list[prevIdx]);
  }
  nextBtn.addEventListener('click', playNext);
  prevBtn.addEventListener('click', playPrev);

  shuffleBtn.addEventListener('click', () => {
    const list = state.flatFiltered;
    if (list.length === 0) return;
    playSong(list[Math.floor(Math.random() * list.length)]);
  });

  function applyModeUi() {
    if (state.mode === 'shuffle-auto') {
      modeBtn.textContent = '🔀 Shuffle (next)';
      modeBtn.classList.add('active');
    } else {
      modeBtn.textContent = '↻ Sequential';
      modeBtn.classList.remove('active');
    }
  }
  modeBtn.addEventListener('click', () => {
    state.mode = state.mode === 'sequential' ? 'shuffle-auto' : 'sequential';
    localStorage.setItem(LS_MODE, state.mode);
    applyModeUi();
  });
  applyModeUi();

  openBtn.addEventListener('click', () => {
    const url = openBtn.dataset.url;
    if (url) window.open(url, '_blank', 'noopener');
  });

  expandAllBtn.addEventListener('click', () => {
    state.collapsed.clear();
    saveCollapsed();
    renderList();
  });
  collapseAllBtn.addEventListener('click', () => {
    state.groups.forEach(g => state.collapsed.add(g.key));
    saveCollapsed();
    renderList();
  });

  async function load() {
    try {
      const res = await fetch(JSON_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state.rawSongs = data
        .map((s, i) => ({ ...s, parsed: parseAppleUrl(s.Url), _id: 's' + i }))
        .filter(s => s.parsed);
      trackCount.textContent = `(${state.rawSongs.length} tracks)`;
      buildGroups();
      renderList();
    } catch (err) {
      songList.innerHTML = `<div class="empty">Failed to load song list:<br>${escapeHtml(err.message)}</div>`;
      console.error(err);
    }
  }
  load();
})();
</script>
</body>
</html>
