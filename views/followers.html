<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND-MAID · Followers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #181818;
    --border:    #2a2a2a;
    --gold:      #c8a96e;
    --gold-dim:  #8a7148;
    --text:      #e8e4dc;
    --muted:     #666;

    /* member accent colors */
    --col-band:   #e8e4dc;
    --col-saiki:  #5b9bd5;
    --col-miku:   #e87ea1;
    --col-kanami: #6abf7a;
    --col-akane:  #c8a96e;
    --col-misa:   #9b72cf;

    /* platform brand colors */
    --x:        #e7e7e7;
    --ig:       #e1306c;
    --tiktok:   #69c9d0;
    --fb:       #1877f2;
    --yt:       #ff0000;
    --spotify:  #1ed760;
    --reddit:   #ff4500;
    --bilibili: #00a1d6;
    --deezer:   #a238ff;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .page-header {
    padding: 28px 24px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .page-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .page-header .subtitle {
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .08em;
    margin-top: 2px;
  }
  .refresh-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    padding: 5px 10px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Loading / Error ── */
  #state {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: .8rem;
  }

  /* ── Main grid ── */
  #app { padding: 20px 16px 32px; }

  /* BAND-MAID banner card */
  .band-card {
    background: linear-gradient(135deg, #141414 0%, #1a1610 100%);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }
  .band-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at top left, rgba(200,169,110,.07) 0%, transparent 60%);
    pointer-events: none;
  }
  .band-card .member-img {
    width: 72px; height: 72px;
    border-radius: 8px;
    object-fit: contain;
    background: transparent;
    border: 2px solid var(--gold-dim);
    flex-shrink: 0;
  }
  .band-card .member-name {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--col-band);
    letter-spacing: .1em;
  }
  .band-card .band-platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .band-card .platform-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px 4px 8px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, background .2s;
  }
  .band-card .platform-pill:hover {
    background: rgba(255,255,255,.08);
  }
  .band-card .platform-pill:hover .pill-icon { filter: brightness(1.4) saturate(1.3); }
  .pill-icon { width: 14px; height: 14px; flex-shrink: 0; }
  .pill-label { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--text); }
  .pill-count { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--gold); }

  /* Member grid */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .member-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    transition: border-color .25s, transform .2s;
    position: relative;
    overflow: hidden;
  }
  .member-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: .7;
  }
  .member-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .member-card .member-img {
    width: 72px; height: 128px;
    border-radius: 8px;
    object-fit: contain;
    background: #000;
    border: 2px solid var(--accent);
    margin-bottom: 10px;
    image-rendering: pixelated;
  }
  .member-card .member-name {
    font-family: 'Cinzel', serif;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .1em;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .member-card .platform-rows {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .platform-row {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
    padding: 5px 7px;
    border-radius: 6px;
    transition: background .15s;
  }
  .platform-row:hover { background: rgba(255,255,255,.05); }
  .platform-row:hover .p-icon { filter: brightness(1.5) saturate(1.2); }
  .p-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: .85; }
  .p-name {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .06em;
    flex: 1;
  }
  .p-count {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--text);
    text-align: right;
  }

  /* Last updated */
  .last-updated {
    text-align: center;
    font-size: .65rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 24px;
    letter-spacing: .05em;
  }

  @media (max-width: 480px) {
    .band-card { flex-direction: column; align-items: flex-start; }
    .member-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Followers</h1>
    <div class="subtitle" id="last-updated-header">Loading…</div>
  </div>
  <button class="refresh-btn" onclick="loadData(true)">↻ Refresh</button>
</div>

<div id="state">Loading…</div>
<div id="app" style="display:none"></div>

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
  return n.toLocaleString();
}

function platformIcon(plat, size = 14) {
  const d = document.createElement('div');
  d.innerHTML = plat.svg;
  const svg = d.querySelector('svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.style.color = plat.color;
  svg.style.fill = plat.color;
  svg.style.flexShrink = '0';
  svg.classList.add('p-icon');
  return svg;
}

function buildBandCard(member) {
  const accent = MEMBER_COLORS[member.Member] || '#e8e4dc';
  const card = document.createElement('div');
  card.className = 'band-card';

  const img = document.createElement('img');
  img.className = 'member-img';
  img.src = member.ImageUrl;
  img.alt = 'BAND-MAID';

  const info = document.createElement('div');
  info.style.flex = '1';

  const name = document.createElement('div');
  name.className = 'member-name';
  name.textContent = 'BAND-MAID';
  info.appendChild(name);

  const pills = document.createElement('div');
  pills.className = 'band-platforms';

  for (const plat of PLATFORMS) {
    const count = member[plat.countKey];
    if (count == null) continue;

    const url = plat.urlKey ? member[plat.urlKey] : null;
    const pill = document.createElement(url ? 'a' : 'div');
    pill.className = 'platform-pill';
    if (url) { pill.href = url; pill.target = '_blank'; pill.rel = 'noopener'; }

    const iconWrap = document.createElement('span');
    iconWrap.className = 'pill-icon';
    iconWrap.style.display = 'flex';
    iconWrap.innerHTML = plat.svg;
    const iconSvg = iconWrap.querySelector('svg');
    if (iconSvg) {
      iconSvg.setAttribute('width', 14); iconSvg.setAttribute('height', 14);
      iconSvg.style.color = plat.color; iconSvg.style.fill = plat.color;
    }

    const label = document.createElement('span');
    label.className = 'pill-label';
    label.textContent = plat.label;

    const countEl = document.createElement('span');
    countEl.className = 'pill-count';
    countEl.style.marginLeft = '4px';
    countEl.textContent = fmt(count);

    pill.appendChild(iconWrap);
    pill.appendChild(label);
    pill.appendChild(countEl);
    pills.appendChild(pill);
  }

  info.appendChild(pills);
  card.appendChild(img);
  card.appendChild(info);
  return card;
}

function buildMemberCard(member) {
  const accent = MEMBER_COLORS[member.Member] || '#e8e4dc';
  const card = document.createElement('div');
  card.className = 'member-card';
  card.style.setProperty('--accent', accent);

  const img = document.createElement('img');
  img.className = 'member-img';
  img.src = member.ImageUrl;
  img.alt = member.Member;

  const name = document.createElement('div');
  name.className = 'member-name';
  name.textContent = member.Member;

  const rows = document.createElement('div');
  rows.className = 'platform-rows';

  for (const plat of PLATFORMS) {
    const count = member[plat.countKey];
    if (count == null) continue;

    const url = plat.urlKey ? member[plat.urlKey] : null;
    const row = document.createElement(url ? 'a' : 'div');
    row.className = 'platform-row';
    if (url) { row.href = url; row.target = '_blank'; row.rel = 'noopener'; }

    const iconWrap = document.createElement('span');
    iconWrap.style.display = 'flex'; iconWrap.style.alignItems = 'center';
    iconWrap.innerHTML = plat.svg;
    const iconSvg = iconWrap.querySelector('svg');
    if (iconSvg) {
      iconSvg.setAttribute('width', 14); iconSvg.setAttribute('height', 14);
      iconSvg.style.color = plat.color; iconSvg.style.fill = plat.color;
      iconSvg.classList.add('p-icon');
    }

    const pName = document.createElement('span');
    pName.className = 'p-name';
    pName.textContent = plat.label;

    const pCount = document.createElement('span');
    pCount.className = 'p-count';
    pCount.textContent = fmt(count);

    row.appendChild(iconWrap);
    row.appendChild(pName);
    row.appendChild(pCount);
    rows.appendChild(row);
  }

  card.appendChild(img);
  card.appendChild(name);
  card.appendChild(rows);
  return card;
}

async function loadData(forceRefresh = false) {
  const stateEl = document.getElementById('state');
  const appEl   = document.getElementById('app');
  const headerSub = document.getElementById('last-updated-header');

  // Cache check
  if (!forceRefresh) {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts < CACHE_TTL) {
          render(data, ts);
          return;
        }
      }
    } catch(e) {}
  }

  stateEl.textContent = 'Loading…';
  stateEl.style.display = 'flex';
  appEl.style.display = 'none';

  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const ts = Date.now();
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts, data })); } catch(e) {}
    render(data, ts);
  } catch(err) {
    stateEl.textContent = 'Could not load follower data. ' + err.message;
  }
}

function render(data, ts) {
  const stateEl = document.getElementById('state');
  const appEl   = document.getElementById('app');
  const headerSub = document.getElementById('last-updated-header');

  appEl.innerHTML = '';

  const members = Array.isArray(data) ? data : [data];
  const band = members.find(m => m.Member === 'BAND-MAID');
  const solo = members.filter(m => m.Member !== 'BAND-MAID');

  if (band) appEl.appendChild(buildBandCard(band));

  const grid = document.createElement('div');
  grid.className = 'member-grid';
  for (const m of solo) grid.appendChild(buildMemberCard(m));
  appEl.appendChild(grid);

  const lastUpdated = document.createElement('div');
  lastUpdated.className = 'last-updated';
  const d = new Date(ts);
  const dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const timeStr = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  lastUpdated.textContent = `Last fetched ${dateStr} at ${timeStr} · Cached 4 hrs`;
  appEl.appendChild(lastUpdated);

  headerSub.textContent = `Updated ${dateStr}`;

  stateEl.style.display = 'none';
  appEl.style.display = 'block';
}

loadData();
</script>
