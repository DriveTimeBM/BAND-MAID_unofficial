<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../logo.png">
<title>BAND-MAID Unofficial · Discord</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;
  --border:#2a2a2a;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#c8a96e;
  --online:#23a55a;
  --discord:#5865f2;
  --radius:8px;--font:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}

/* ── HEADER ── */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.app-logo{width:34px;height:34px;background:#111;border:1px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.app-logo img{width:22px;height:22px;object-fit:contain}
.app-nav-title{font-size:15px;font-weight:600;letter-spacing:0.04em}

/* ── MAIN ── */
.stage{max-width:560px;margin:0 auto;padding:24px 16px 48px}

/* ── SERVER CARD ── */
.server-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  display:flex;flex-direction:column;gap:16px;
}

/* Server identity row */
.server-identity{display:flex;align-items:center;gap:14px}
.server-icon{
  width:52px;height:52px;border-radius:12px;
  background:var(--discord);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;overflow:hidden;
}
.server-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.server-info{flex:1;min-width:0}
.server-name{font-size:17px;font-weight:700;letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.server-counts{display:flex;align-items:center;gap:14px;margin-top:4px}
.count-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.online{background:var(--online)}
.dot.total{background:var(--text3)}

/* Invite button */
.invite-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--discord);color:#fff;
  border:none;border-radius:var(--radius);
  padding:10px 20px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  text-decoration:none;
  transition:opacity 0.15s,transform 0.1s;
  align-self:flex-start;
}
.invite-btn:hover{opacity:0.88}
.invite-btn:active{transform:scale(0.97)}
.invite-btn svg{width:16px;height:16px;flex-shrink:0}

/* Divider */
.divider{height:1px;background:var(--border)}

/* Online members strip */
.members-section{}
.members-label{
  font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.members-label::after{content:'';flex:1;height:1px;background:var(--border)}
.avatars{
  display:flex;flex-wrap:wrap;gap:6px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg3);border:2px solid var(--bg2);
  overflow:hidden;flex-shrink:0;position:relative;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--text2);
  background:var(--bg3);
  user-select:none;
}
/* online indicator dot on avatar */
.avatar::after{
  content:'';position:absolute;bottom:0;right:0;
  width:10px;height:10px;border-radius:50%;
  background:var(--online);
  border:2px solid var(--bg2);
}

/* ── LOADING / ERROR ── */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:60vh;color:var(--text3);font-size:13px;text-align:center;padding:24px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-icon{font-size:32px}
.err-title{font-size:15px;color:var(--text2)}
.retry-btn{margin-top:4px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:var(--font)}
.retry-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── NO MEMBERS NOTE ── */
.no-members{font-size:12px;color:var(--text3);font-style:italic}
</style>
</head>
<body>

  
<div class="app-header">
  <div class="app-logo"><img src="../logo.png" alt="logo" onerror="this.parentNode.textContent='🎸'"></div>
  <div>
    <div class="app-nav-title">BAND-MAID Unofficial</div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     BAND-MAID DISCORD WIDGET — drop anywhere in a page
     Requires no external dependencies.
     Copy everything between the START and END comments.
     ═══════════════════════════════════════════════════════ -->
<!-- DISCORD WIDGET START -->
<div id="bm-discord-widget"></div>
<style>
#bm-discord-widget{display:inline-block}
.bm-dc{
  display:flex;align-items:center;gap:10px;
  background:#141414;border:1px solid #2a2a2a;border-radius:8px;
  padding:10px 14px;font-family:'Segoe UI',system-ui,sans-serif;
  min-width:220px;max-width:320px;
}
.bm-dc-icon{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  overflow:hidden;background:#5865f2;
  display:flex;align-items:center;justify-content:center;
}
.bm-dc-icon img{width:100%;height:100%;object-fit:cover}
.bm-dc-body{flex:1;min-width:0}
.bm-dc-name{
  font-size:13px;font-weight:700;color:#f0f0f0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.01em;
}
.bm-dc-status{
  display:flex;align-items:center;gap:5px;margin-top:3px;
}
.bm-dc-dot{width:7px;height:7px;border-radius:50%;background:#23a55a;flex-shrink:0}
.bm-dc-online{font-size:11px;color:#999}
.bm-dc-online span{color:#f0f0f0;font-weight:600}
.bm-dc-btn{
  display:inline-flex;align-items:center;gap:6px;flex-shrink:0;
  background:#5865f2;color:#fff;border:none;border-radius:6px;
  padding:7px 12px;font-size:12px;font-weight:700;
  cursor:pointer;text-decoration:none;font-family:inherit;
  transition:opacity 0.15s;white-space:nowrap;
}
.bm-dc-btn:hover{opacity:0.85}
.bm-dc-btn svg{width:14px;height:14px;flex-shrink:0}
</style>
<script>
(function(){
  const GUILD_ID   = '1404984552161673448';
  const GUILD_NAME = 'BAND-MAID Dashboard';
  const INVITE     = 'https://discord.com/invite/HeFJJUQk';
  const ICON_URL   = 'https://drivetimebm.github.io/BAND-MAID_unofficial/discord/server-icon.png';
  const WIDGET_URL = 'https://drivetimebm.github.io/BAND-MAID_unofficial/discord/discord-widget.json';

  const discordLogoSvg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`;

  function render(online) {
    const el = document.getElementById('bm-discord-widget');
    el.innerHTML = `
      <div class="bm-dc">
        <div class="bm-dc-icon">
          <img src="${ICON_URL}" alt="" onerror="this.parentNode.innerHTML='💬'">
        </div>
        <div class="bm-dc-body">
          <div class="bm-dc-name">${GUILD_NAME}</div>
          <div class="bm-dc-status">
            <div class="bm-dc-dot"></div>
            <div class="bm-dc-online"><span>${online !== null ? online.toLocaleString() : '—'}</span> online</div>
          </div>
        </div>
        <a class="bm-dc-btn" href="${INVITE}" target="_blank" rel="noopener">
          ${discordLogoSvg} Join
        </a>
      </div>`;
  }

  // Render immediately with cached count, then update from JSON
  render(null);
  fetch(WIDGET_URL)
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d) render(d.presence_count ?? null); })
    .catch(() => {});  // silently keep the — placeholder on failure
})();
</script>
<!-- DISCORD WIDGET END -->



<div class="stage" id="stage">
  <div class="state-msg" id="loadingState">
    <div class="spinner"></div>
    <span>Connecting to Discord…</span>
  </div>
</div>

<script>
const CONFIG_URL  = 'discord-config.json';
const CORS_PROXY  = 'https://corsproxy.io/?url=';
const CACHE_KEY   = 'bm_discord_widget';

let WIDGET_URL  = 'https://discord.com/api/guilds/1404984552161673448/widget.json';
let REFRESH_MS  = 5 * 60 * 1000;
let CACHE_TTL   = 3 * 60 * 1000;

async function init() {
  try {
    const res = await fetch(CONFIG_URL);
    if (res.ok) {
      const cfg = await res.json();
      if (cfg.widgetUrl)       WIDGET_URL = cfg.widgetUrl;
      if (cfg.refreshSeconds)  REFRESH_MS = cfg.refreshSeconds * 1000;
      if (cfg.cacheTTLSeconds) CACHE_TTL  = cfg.cacheTTLSeconds * 1000;
    }
  } catch(e) {
    // Config load failure — use defaults silently
  }
  load();
}

async function load() {
  // Serve from cache if fresh enough
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL) {
        render(data);
        return;
      }
    }
  } catch(e) {}

  // Fetch live — direct first, proxy fallback
  let data = null;
  let lastErr = '';

  for (const url of [WIDGET_URL, CORS_PROXY + encodeURIComponent(WIDGET_URL)]) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
      break;
    } catch(e) {
      lastErr = e.message;
    }
  }

  if (data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
    render(data);
  } else {
    // If fetch failed but we have stale cache, show it with a note rather than error
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { data: stale } = JSON.parse(cached);
        render(stale, true);   // true = stale flag
        return;
      }
    } catch(e) {}
    showError(lastErr);
  }
}

function render(data, stale) {
  const members  = data.members  || [];
  const name     = data.name     || 'Discord Server';
  const invite   = data.instant_invite || null;
  const online   = data.presence_count ?? members.length;

  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  // Stale data notice
  if (stale) {
    const notice = document.createElement('div');
    notice.style.cssText = 'font-size:11px;color:var(--text3);margin-bottom:12px;text-align:center';
    notice.textContent = 'Showing cached data — Discord is temporarily rate limiting requests.';
    stage.appendChild(notice);
  }

  const card = document.createElement('div');
  card.className = 'server-card';

  // ── SERVER IDENTITY ──
  const identity = document.createElement('div');
  identity.className = 'server-identity';
  identity.innerHTML = `
    <div class="server-icon">
      <span>💬</span>
    </div>
    <div class="server-info">
      <div class="server-name">${esc(name)}</div>
      <div class="server-counts">
        <div class="count-item">
          <div class="dot online"></div>
          <span><strong>${online.toLocaleString()}</strong> online</span>
        </div>
      </div>
    </div>`;
  card.appendChild(identity);

  // ── INVITE BUTTON ──
  if (invite) {
    const btn = document.createElement('a');
    btn.className = 'invite-btn';
    btn.href = invite;
    btn.target = '_blank';
    btn.rel = 'noopener';
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Join Server`;
    card.appendChild(btn);
  }

  // ── DIVIDER + AVATARS ──
  if (members.length > 0) {
    card.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));

    const section = document.createElement('div');
    section.className = 'members-section';

    const label = document.createElement('div');
    label.className = 'members-label';
    label.textContent = `Online now — ${members.length} visible`;
    section.appendChild(label);

    const strip = document.createElement('div');
    strip.className = 'avatars';

    members.forEach(m => {
      const wrap = document.createElement('div');
      wrap.className = 'avatar';
      wrap.title = m.username || '';

      if (m.avatar_url) {
        const img = document.createElement('img');
        img.src = m.avatar_url;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = function() {
          this.parentNode.innerHTML = `<div class="avatar-fallback">${esc((m.username || '?')[0].toUpperCase())}</div>`;
        };
        wrap.appendChild(img);
      } else {
        wrap.innerHTML = `<div class="avatar-fallback">${esc((m.username || '?')[0].toUpperCase())}</div>`;
      }

      strip.appendChild(wrap);
    });

    section.appendChild(strip);
    card.appendChild(section);
  } else {
    card.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
    const note = document.createElement('div');
    note.className = 'no-members';
    note.textContent = 'No members currently visible — widget avatars may be disabled on this server.';
    card.appendChild(note);
  }

  stage.appendChild(card);

  // Auto-refresh
  setTimeout(load, REFRESH_MS);
}

function showError(msg) {
  document.getElementById('stage').innerHTML = `
    <div class="state-msg">
      <div class="err-icon">💬</div>
      <div class="err-title">Could not reach Discord</div>
      <div>${esc(msg)}</div>
      <button class="retry-btn" onclick="load()">Retry</button>
    </div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
