<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../logo.png">
<title>BAND-MAID Unofficial · Fan Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;
  --border:#2a2a2a;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --accent:#c8a96e;--accent-dim:rgba(200,169,110,0.1);--accent-border:rgba(200,169,110,0.25);
  --success:#22c55e;--green:#22c55e;
  --radius:8px;--font:'Segoe UI',system-ui,sans-serif;
  --header-h:52px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}

/* ── HEADER ── */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:300;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
.app-logo{width:32px;height:32px;background:#111;border:1px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-logo img{width:20px;height:20px;object-fit:contain}
.app-title{font-size:14px;font-weight:700}

/* ── CONTENT ── */
.content{
  position:fixed;top:var(--header-h);left:0;right:0;bottom:0;
  overflow-y:auto;padding:28px 32px 48px;max-width:860px;
}

/* Intro */
.intro-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:28px;
  font-size:13px;color:var(--text2);line-height:1.7;
}

/* Category heading */
.cat-label{
  font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;margin-top:28px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.cat-label:first-of-type{margin-top:0}

/* Tool card */
.tool-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden;
}
.tool-header{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;transition:background 0.12s;
}
.tool-header:hover{background:var(--bg3)}
.tool-card.open .tool-header{border-bottom:1px solid var(--border)}
.tool-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.tool-info{flex:1;min-width:0}
.tool-name{font-size:13px;font-weight:700;color:var(--text)}
.tool-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.tool-badge{
  font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);
}
.tool-badge.platform{border-color:rgba(139,92,246,0.3);color:#8b5cf6;background:rgba(139,92,246,0.08)}
.tool-badge.requires{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.tool-chevron{font-size:10px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.tool-card.open .tool-chevron{transform:rotate(90deg)}

.tool-body{display:none;padding:16px}
.tool-card.open .tool-body{display:block}

.tool-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}

.tips-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.tips-list{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.tips-list li{font-size:12px;color:var(--text2);padding-left:16px;position:relative;line-height:1.5}
.tips-list li::before{content:'💡';position:absolute;left:0;font-size:10px;top:1px}

.tool-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tool-btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
  border-radius:var(--radius);font-size:12px;font-weight:600;text-decoration:none;
  border:1px solid var(--border2);background:var(--bg3);color:var(--text2);
  transition:all 0.15s;cursor:pointer;font-family:var(--font);
}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.tool-btn.primary:hover{opacity:0.85}
.tool-btn svg{width:13px;height:13px}

/* Demo video */
.demo-wrap{
  margin-top:14px;border-radius:var(--radius);overflow:hidden;background:#000;
  aspect-ratio:16/9;max-width:560px;
}
.demo-wrap iframe{width:100%;height:100%;border:none;display:block}

/* Loading */
.state-msg{display:flex;align-items:center;justify-content:center;height:60vh;
  gap:14px;color:var(--text3);font-size:13px;flex-direction:column}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:660px){.content{padding:16px 16px 48px}}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo"><img src="../logo.png" alt="" onerror="this.parentNode.textContent='🛠️'"></div>
  <div class="app-title">Fan Tools</div>
</div>

<div class="content" id="content">
  <div class="state-msg"><div class="spinner"></div><span>Loading tools…</span></div>
</div>

<script>
const EXTRAS_JSON = '../guide/extras.json';

async function boot() {
  try {
    const res = await fetch(EXTRAS_JSON);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="state-msg"><div>⚠️ Could not load tools</div><div style="font-size:12px">${esc(e.message)}</div></div>`;
  }
}

function render(data) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (data.intro) {
    const intro = document.createElement('div');
    intro.className = 'intro-box';
    intro.textContent = data.intro;
    content.appendChild(intro);
  }

  // Group tools by category
  const categories = {};
  (data.tools || []).forEach(t => {
    const cat = t.category || 'Other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(t);
  });

  Object.entries(categories).forEach(([cat, tools]) => {
    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat;
    content.appendChild(label);

    tools.forEach(tool => content.appendChild(buildToolCard(tool)));
  });
}

function buildToolCard(tool) {
  const card = document.createElement('div');
  card.className = 'tool-card';

  const hdr = document.createElement('div');
  hdr.className = 'tool-header';
  hdr.innerHTML = `
    <span class="tool-icon">${tool.icon || '🔧'}</span>
    <div class="tool-info">
      <div class="tool-name">${esc(tool.name)}</div>
      <div class="tool-meta">
        ${tool.platform ? `<span class="tool-badge platform">${esc(tool.platform)}</span>` : ''}
        ${tool.requires ? `<span class="tool-badge requires">Requires: ${esc(tool.requires)}</span>` : ''}
      </div>
    </div>
    <span class="tool-chevron">▶</span>`;
  hdr.onclick = () => card.classList.toggle('open');

  const body = document.createElement('div');
  body.className = 'tool-body';

  let html = `<div class="tool-desc">${esc(tool.description)}</div>`;

  if (tool.tips?.length) {
    html += `<div class="tips-label">Tips</div>
      <ul class="tips-list">
        ${tool.tips.map(t => `<li>${esc(t)}</li>`).join('')}
      </ul>`;
  }

  html += `<div class="tool-actions">`;
  if (tool.installUrl) {
    html += `<a class="tool-btn" href="${esc(tool.installUrl)}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Install Prerequisite
    </a>`;
  }
  if (tool.downloadUrl) {
    html += `<a class="tool-btn primary" href="${esc(tool.downloadUrl)}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Script
    </a>`;
  }
  html += `</div>`;

  if (tool.videoId) {
    html += `<div class="demo-wrap">
      <iframe src="https://www.youtube.com/embed/${esc(tool.videoId)}?rel=0&modestbranding=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen loading="lazy"></iframe>
    </div>`;
  }

  body.innerHTML = html;
  card.appendChild(hdr);
  card.appendChild(body);
  return card;
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

boot();
</script>
</body>
</html>
