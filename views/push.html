<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../logo.png">
<title>BAND-MAID Unofficial · Push to One Million</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;
  --border:#2a2a2a;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#c8a96e;--accent-dim:rgba(200,169,110,0.12);--accent-border:rgba(200,169,110,0.3);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.08);
  --success:#22c55e;
  --radius:8px;--font:'Segoe UI',system-ui,sans-serif;
  --header-h:57px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}

/* ── APP HEADER ── */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:300;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:12px;
}
.app-logo{width:34px;height:34px;background:#111;border:1px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-logo img{width:22px;height:22px;object-fit:contain}
.app-nav-title{font-size:15px;font-weight:600;letter-spacing:0.04em}
.app-nav-sub{font-size:11px;color:var(--text3)}

/* ── TWO-COLUMN BODY ── */
.app-body{
  position:fixed;
  top:var(--header-h);left:0;right:0;bottom:0;
  display:grid;
  grid-template-columns:360px 1fr;
}

/* ── LEFT: VIDEO LIST ── */
.list-col{
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.list-header{
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  position:sticky;top:0;z-index:10;
}
.list-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)}
.list-count{font-size:11px;color:var(--text3);margin-top:2px}
.list-header-row{display:flex;align-items:center;justify-content:space-between}
.loop-btn{
  background:none;border:1px solid var(--border);border-radius:20px;
  color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;
  padding:3px 10px;font-family:var(--font);transition:all 0.15s;
  display:flex;align-items:center;gap:4px;
}
.loop-btn:hover{border-color:var(--accent);color:var(--accent)}
.loop-btn.active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* Video item */
.video-item{
  display:flex;gap:10px;padding:10px 12px;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background 0.12s;align-items:flex-start;
  border-left:3px solid transparent;
}
.video-item:hover{background:var(--bg3)}
.video-item.active{background:var(--red-dim);border-left-color:var(--red)}
.video-item.active .video-title{color:#ff8080}

/* Rank badge */
.video-rank{
  width:22px;height:22px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--text3);margin-top:1px;
}
.video-item.active .video-rank{background:var(--red);border-color:var(--red);color:#fff}

/* Thumb */
.video-thumb-wrap{position:relative;flex-shrink:0;width:96px}
.video-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px;display:block;background:var(--bg3)}
.playing-badge{
  position:absolute;bottom:3px;left:3px;
  background:var(--red);color:#fff;
  font-size:8px;font-weight:700;letter-spacing:0.05em;
  padding:1px 4px;border-radius:2px;
}

/* Info */
.video-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.video-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-stats{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:1px}
.stat{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:2px}
.stat.views{color:var(--accent);font-weight:600}
.stat.rate{color:var(--success)}

/* Progress */
.progress-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:2px;background:var(--accent)}
.progress-label{font-size:9px;color:var(--text3);margin-top:2px;display:flex;justify-content:space-between}

/* ── RIGHT: PLAYER COL ── */
.player-col{
  display:flex;flex-direction:column;
  background:var(--bg);
  overflow-y:auto;
}

/* Player */
.player-wrap{background:#000;flex-shrink:0}
.player-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}

/* Now playing */
.now-playing{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 16px;flex-shrink:0;
}
.np-eyebrow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.np-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.np-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.np-index{font-size:10px;color:var(--text3);margin-left:auto}
.np-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:10px}

/* Metadata grid */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.meta-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.meta-value{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.meta-value.accent{color:var(--accent)}
.meta-value.success{color:var(--success)}
.meta-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* Big progress */
.big-progress-section{padding:14px 16px 0;flex-shrink:0}
.big-progress-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.big-progress-label span{color:var(--accent);font-size:12px}
.big-progress-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.big-progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#e8c97e)}
.big-progress-sublabels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}

/* Projection box */
.projection-box{
  margin:14px 16px 0;flex-shrink:0;
  background:var(--accent-dim);border:1px solid var(--accent-border);
  border-radius:var(--radius);overflow:hidden;
}
.proj-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;font-size:12px;
  border-bottom:1px solid rgba(200,169,110,0.1);
}
.proj-row:last-child{border-bottom:none}
.proj-label{color:var(--text3)}
.proj-value{color:var(--accent);font-weight:600}

/* YT link */
.yt-link{
  display:inline-flex;align-items:center;gap:6px;
  margin:12px 16px 16px;flex-shrink:0;align-self:flex-start;
  color:var(--red);font-size:12px;text-decoration:none;font-weight:600;
}
.yt-link:hover{text-decoration:underline}
.yt-link svg{width:13px;height:13px}

/* ── MOBILE ── */
@media(max-width:720px){
  .app-body{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
    overflow:hidden;
  }
  .player-col{grid-row:1;max-height:70vh}
  .list-col{grid-row:2;border-right:none;border-top:1px solid var(--border)}
}

/* ── LOADING / ERROR ── */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;color:var(--text3);font-size:13px;text-align:center;padding:24px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.retry-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:var(--font)}
.retry-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo"><img src="../logo.png" alt="" onerror="this.parentNode.textContent='🎯'"></div>
  <div>
    <div class="app-nav-title">Push to One Million</div>
    <div class="app-nav-sub">BAND-MAID Unofficial</div>
  </div>
</div>

<div class="app-body" id="appBody">
  <div class="list-col"><div class="state-msg"><div class="spinner"></div><span>Loading…</span></div></div>
  <div class="player-col"><div class="state-msg"><div class="spinner"></div></div></div>
</div>

<script>
const JSON_URL = 'https://drivetimebm.github.io/BAND-MAID_gpt/misc/million_push.json';
let videos   = [];
let current  = 0;
let looping  = false;
let ytPlayer = null;
let ytApiReady = false;
let pendingVideoId = null;  // load this once API is ready

// ── YOUTUBE API CALLBACK ──────────────────────────────────────────────────────
// Called automatically by the YT API script when it's ready
window.onYouTubeIframeAPIReady = function() {
  ytApiReady = true;
  if (pendingVideoId) createPlayer(pendingVideoId);
};

function createPlayer(videoId) {
  if (!ytApiReady) { pendingVideoId = videoId; return; }
  pendingVideoId = null;

  // Destroy existing player if any
  if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }

  // Ensure the target div exists
  const el = document.getElementById('yt-player');
  if (!el) return;

  ytPlayer = new YT.Player('yt-player', {
    videoId,
    playerVars: { rel: 0, modestbranding: 1, autoplay: 0 },
    events: {
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED) {
          const next = current + 1;
          if (next < videos.length) {
            selectVideo(next, true);
          } else if (looping) {
            selectVideo(0, true);  // loop back to first
          }
        }
      }
    }
  });
}

async function boot() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    videos = (Array.isArray(raw) ? raw : [raw]).map((v, i) => ({
      ...v,
      _id:        extractId(v.URL),
      _thumb:     thumbUrl(extractId(v.URL)),
      _pubDate:   parseDotNetDate(v.PublishDate),
      _milestone: parseDotNetDate(v.DateofNextMillion),
      _rank:      i + 1,
      _pct:       Math.min(100, ((v.Views / 1000000) * 100).toFixed(1)),
    }));
    render();
  } catch(e) {
    document.getElementById('appBody').innerHTML = `
      <div class="list-col"><div class="state-msg">
        <div>⚠️</div><div>${esc(e.message)}</div>
        <button class="retry-btn" onclick="boot()">Retry</button>
      </div></div><div class="player-col"></div>`;
  }
}

function render() {
  const body = document.getElementById('appBody');
  body.innerHTML = '';

  // LEFT COLUMN
  const listCol = document.createElement('div');
  listCol.className = 'list-col';
  listCol.id = 'listCol';
  const lh = document.createElement('div');
  lh.className = 'list-header';
  lh.innerHTML = `
    <div class="list-header-row">
      <div class="list-title">🚀 Push to One Million</div>
      <button class="loop-btn" id="loopBtn" onclick="toggleLoop()">⟳ Loop</button>
    </div>
    <div class="list-count">${videos.length} videos · sorted by proximity to 1M</div>`;
  listCol.appendChild(lh);
  videos.forEach((v, i) => listCol.appendChild(buildItem(v, i)));

  // RIGHT COLUMN
  const playerCol = document.createElement('div');
  playerCol.className = 'player-col';
  playerCol.id = 'playerCol';
  playerCol.innerHTML = buildPlayerCol(current);

  body.appendChild(listCol);
  body.appendChild(playerCol);

  // Initialise the YT player now the #yt-player div exists
  createPlayer(videos[current]._id);
}

function buildItem(v, i) {
  const item = document.createElement('div');
  item.className = 'video-item' + (i === current ? ' active' : '');
  item.id = `item-${i}`;
  item.onclick = () => selectVideo(i);

  const milestoneStr = v._milestone
    ? v._milestone.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'})
    : '—';

  item.innerHTML = `
    <div class="video-rank">${v._rank}</div>
    <div class="video-thumb-wrap">
      <img class="video-thumb" src="${esc(v._thumb)}" alt="" loading="lazy"
        onerror="this.style.display='none'">
      ${i === current ? '<div class="playing-badge">▶ NOW</div>' : ''}
    </div>
    <div class="video-info">
      <div class="video-title">${esc(v.VideoTitle)}</div>
      <div class="video-stats">
        <div class="stat views">👁 ${fmt(v.Views)}</div>
        <div class="stat rate">+${fmt(v.ViewsRatePerDay)}/day</div>
        <div class="stat">👍 ${fmt(v.Likes)}</div>
        <div class="stat">💬 ${fmt(v.Comments)}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${v._pct}%"></div>
      </div>
      <div class="progress-label">
        <span>${v._pct}% to 1M</span>
        <span>~${v.DaysToNextMillion}d · ${milestoneStr}</span>
      </div>
    </div>`;
  return item;
}

function buildPlayerCol(i) {
  // The player div is created once; info panel is updated separately
  return `
    <div class="player-wrap">
      <div id="yt-player"></div>
    </div>
    <div id="playerInfo">${buildPlayerInfo(i)}</div>`;
}

function buildPlayerInfo(i) {
  const v = videos[i];
  if (!v) return '';
  const milestoneStr = v._milestone
    ? v._milestone.toLocaleDateString(undefined, {year:'numeric',month:'long',day:'numeric'})
    : '—';
  const pubStr = v._pubDate
    ? v._pubDate.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'})
    : '—';
  const needed = Math.max(0, 1000000 - v.Views).toLocaleString();
  return `
    <div class="now-playing">
      <div class="np-eyebrow">
        <div class="np-dot"></div>
        <div class="np-label">Now Loaded</div>
        <div class="np-index">#${v._rank} of ${videos.length}</div>
      </div>
      <div class="np-title">${esc(v.VideoTitle)}</div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">Views</div>
          <div class="meta-value accent">${fmt(v.Views)}</div>
          <div class="meta-sub">${needed} still needed</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Views / Day</div>
          <div class="meta-value success">+${fmt(v.ViewsRatePerDay)}</div>
          <div class="meta-sub">current rate</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Likes</div>
          <div class="meta-value">${fmt(v.Likes)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Comments</div>
          <div class="meta-value">${fmt(v.Comments)}</div>
        </div>
      </div>
    </div>
    <div class="big-progress-section">
      <div class="big-progress-label">
        Progress to 1,000,000
        <span>${v._pct}%</span>
      </div>
      <div class="big-progress-bar-wrap">
        <div class="big-progress-bar" style="width:${v._pct}%"></div>
      </div>
      <div class="big-progress-sublabels">
        <span>${fmt(v.Views)} views</span>
        <span>1,000,000</span>
      </div>
    </div>
    <div class="projection-box">
      <div class="proj-row">
        <span class="proj-label">Days to milestone</span>
        <span class="proj-value">~${v.DaysToNextMillion} days</span>
      </div>
      <div class="proj-row">
        <span class="proj-label">Projected date</span>
        <span class="proj-value">${milestoneStr}</span>
      </div>
      <div class="proj-row">
        <span class="proj-label">Published</span>
        <span class="proj-value">${pubStr}</span>
      </div>
    </div>
    <a class="yt-link" href="${esc(v.URL)}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open in YouTube
    </a>`;
}

function selectVideo(i, autoplay = false) {
  const prev = current;
  current = i;

  // Update list highlight
  const prevEl = document.getElementById(`item-${prev}`);
  const nextEl = document.getElementById(`item-${i}`);
  if (prevEl) {
    prevEl.classList.remove('active');
    prevEl.querySelector('.playing-badge')?.remove();
  }
  if (nextEl) {
    nextEl.classList.add('active');
    const tw = nextEl.querySelector('.video-thumb-wrap');
    if (!tw.querySelector('.playing-badge')) {
      const b = document.createElement('div');
      b.className = 'playing-badge';
      b.textContent = '▶ NOW';
      tw.appendChild(b);
    }
    nextEl.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  // Load new video via API — autoplay if triggered by end-of-video
  const v = videos[i];
  if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
    if (autoplay) {
      ytPlayer.loadVideoById(v._id);   // loadVideoById starts playing immediately
    } else {
      ytPlayer.cueVideoById(v._id);    // cueVideoById loads but doesn't autoplay
    }
  } else {
    createPlayer(v._id);
  }

  // Rebuild the info/metadata panel below the player (not the player itself)
  const infoEl = document.getElementById('playerInfo');
  if (infoEl) infoEl.innerHTML = buildPlayerInfo(i);
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('loopBtn');
  if (btn) btn.classList.toggle('active', looping);
}

function extractId(url) {
  const m = String(url||'').match(/(?:youtu\.be\/|[?&]v=)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}
function thumbUrl(id) { return id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : ''; }
function parseDotNetDate(s) {
  const m = String(s||'').match(/Date\((\d+)\)/);
  return m ? new Date(parseInt(m[1])) : null;
}
function fmt(n) { return Number(n).toLocaleString(); }
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

boot();
</script>
</body>
</html>
